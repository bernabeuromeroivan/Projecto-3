<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="sign_in.css" />
        <link
      href="https://fonts.cdnfonts.com/css/sf-pro-display"
      rel="stylesheet"
    />
    <title>Sign In</title>
  </head>
  <body>
    <div class="container">
      <header class="encabezado">
        <div class="logo">
          <img src="imagenes/mydreamplace.svg" alt="Logo" />
        </div>
      </header>
      <div>
        <div class="formulario">
          <h2 class="titulo">Sign In</h2>
          <form class="relleno">
            <div class="texto">
              <label for="email">Email Adrees</label>
              <input type="text" id="username" name="username" required /> 
            </div>
            <div class="texto">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required />
            </div>
          </form>
          <div class="sign_in">
            <label for="signed_in">
              <input type="checkbox" id="remember" name="remember" />Keep me signed in
            </label>
            <p class="contraseña"><a href="password.html">Forgot Password?</a></p>
          </div>
          <div>
            <button class="boton">Continue with email</button>
          </div>
          <div class="texto_linea">
            <hr class="linea">
            <p>or use one of these options</p>
          </div>
          <div>
            <button class="boton_google"><img src="imagenes/google.svg" alt="Google">Continue with Google</button>
          </div>
          <div>
            <button class="boton_facebook"><img src="imagenes/facebook.svg" alt="Google">Continue with Facebook</button>
          </div>
          <div class="registro">
            <p>Don’t have an account?</p>
            <p class="registrar"><a href="registrar.html">Registrar</a></p>
          </div>
      </div>
    </div>
  </body>
</html>
