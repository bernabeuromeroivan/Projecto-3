    <title>Create password</title>

  <body>
    <div class="container">
      <header class="encabezado">
        <div class="logo">
          <img src="imagenes/mydreamplace.svg" alt="Logo" />
        </div>
      </header>
      <div>
        <div class="formulario">
          <h2 class="titulo">Create Password</h2>
          <p class="caracteres">Use a minimum of 10 characters, including letters, lowercase letters, and numbers.</p>
          <form class="relleno">
            <div class="texto">
              <label for="password">Password</label>
              <input type="text" id="username" name="username" required /> 
            </div>
            <div class="texto">
              <label for="password">Confirm Password</label>
              <input type="text" id="username" name="username" required /> 
            </div>
          </form>
          <div>
            <button class="boton">Create Account</button>
          </div>
          <div class="terminos">
            <p>By creating an account, you agree with our Terms and Conditions and Privacy Statement.</p>
          </div>
      </div>
    </div>
