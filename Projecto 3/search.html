<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link rel="stylesheet" href="search.css">
        <link
      href="https://fonts.cdnfonts.com/css/sf-pro-display"
      rel="stylesheet"
    />
</head>
<body>
    <div>
    <header>                        
        <div class="encabezado">
            <div class="logo">
                <img src="imagenes/logo_blanco.svg" alt="Logo" />
            </div>
            <div class="contenido_header">
                <ul class="lista">
                    <li><a href="">Home</a></li>
                    <li><a href="">Discover</a></li>
                    <li><a href="">Activities</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Contact</a></li>
                </ul>
            </div>
            <div class="icono">
                <img class="notificacion" src="imagenes/notificacion.svg" alt="Notificacion">
                <img class="foto" src="imagenes/icono.svg" alt="Icono">
            </div>
        </div>
        <div class="formulario">
            <form class="form">
                <img src="imagenes/location.svg" alt="Location" />
            <input
            type="text"
            placeholder="Where do you want to go?"
            class="where"
          />
          <img src="imagenes/calendar.png" alt="Mar 18, 2022" />
          <input type="text" placeholder="Check in date" class="check" />
          <img src="imagenes/calendar.png" alt="March 20, 2022" />
          <input type="text" placeholder="Check out date" class="check_out" />
          <img src="imagenes/user.svg" alt="" />
          <input type="text" placeholder="Guests" class="2 adult, 1 room" />
          <button class="boton_form">Search</button>
        </form>
      </div>   
    </header>
</body>
</html>
